<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html{
            height: 200px;
            width: 200px;
        }
        *{
            padding: 0px;
            margin: 0px;
        }
        .circle{
            height: 1rem;
            width: 1rem;
            background-color: orange;
            border-radius:50%;
        }
        .square{
            height: 1rem;
            width: 1rem;
            background-color: aqua;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="circle"></div>
    <div class="square"></div>
</body>
</html>
